sandbox_mode = "danger-full-access"
model = "gpt-5.4"
model_context_window = 1000000
model_auto_compact_token_limit = 800000
model_reasoning_effort = "xhigh"
disable_response_storage = true
model_reasoning_summary = "detailed"
network_access = true
service_tier = "fast"
developer_instructions = "Minimize fault tolerance and avoid fallback mechanisms."

[features]
undo = true
shell_tool = true
unified_exec = true
shell_snapshot = true
powershell_utf8 = true
enable_request_compression = true
skill_mcp_dependency_install = true
steer = true
collaboration_modes = true
personality = true
multi_agent = true

# Copy the canonical role-layer templates from `sub-agents/codex/*.toml`
# into `~/.codex/agents/`, then keep the relative `config_file` paths below.
[agents]
max_threads = 6
max_depth = 1

# Same-named `[agents.<role>]` entries override builtin role metadata.
[agents.default]
description = "Default agent."
config_file = "agents/default.toml"

[agents.worker]
description = "Use for execution and production work."
config_file = "agents/worker.toml"

[agents.explorer]
description = "Use for specific codebase questions and read-only evidence gathering."
config_file = "agents/explorer.toml"

[agents.spark]
description = "Use for low-context, speed-first, text-only repo reading, targeted evidence gathering, and simple bounded tasks within Spark's 128k context. Avoid broad multi-file exploration or multimodal work."
config_file = "agents/spark.toml"

[agents.awaiter]
description = "Use for long-running wait or poll workflows."
config_file = "agents/awaiter.toml"

[tui]
status_line = [
    "model-with-reasoning",
    "current-dir",
    "git-branch",
    "context-used",
    "context-window-size",
]

[mcp_servers]

[mcp_servers.context7]
type = "stdio"
command = "cmd"
args = [
    "/c",
    "npx",
    "-y",
    "@upstash/context7-mcp",
    "--api-key",
    "YOUR_CONTEXT7_API_KEY",
]

[notice.model_migrations]
"gpt-5.2" = "gpt-5.3-codex"

[windows]
sandbox = "elevated"
