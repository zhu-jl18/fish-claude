# Practical Codex role-layer example.
#
# Rules:
# - Omitted keys inherit from the parent agent.
# - A same-named `[agents.<role>]` entry in `config.toml` overrides builtin role
#   metadata such as `description`, `config_file`, and `nickname_candidates`.
# - To follow the parent's current model / provider / profile, do not set
#   `model`, `model_provider`, or `profile`.
# - Spawn runtime overwrites the live `approval_policy`,
#   `shell_environment_policy`, `sandbox_mode`, `sandbox_workspace_write`,
#   and `cwd`, so those are usually not worth putting here.

model_reasoning_effort = "xhigh"
service_tier = "fast"

[features]
fast_mode = true

# Common optional overrides:
# model_reasoning_summary = "detailed"
# model_verbosity = "medium"
# plan_mode_reasoning_effort = "high"
# developer_instructions = ""
# compact_prompt = ""
# web_search = "live"

# [tools]
# view_image = true
# web_search = true

# [windows]
# sandbox = "elevated"
